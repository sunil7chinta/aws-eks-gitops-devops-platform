apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: productcatalog-service
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/sunil7chinta/Devops-otel-project
    targetRevision: main
    path: kubernetes/productcatalog
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true

  revisionHistoryLimit: 5
